# LLaMA-Factory fine-tuning configuration for Qwen2.5-Coder
# See: https://github.com/hiyouga/LLaMA-Factory

model_name_or_path: ../models/base_qwen_7b
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 8
lora_alpha: 16
lora_target: all

dataset: code_alpaca
template: qwen
cutoff_len: 4096
max_samples: 1000
overwrite_cache: true
preprocessing_num_workers: 4

output_dir: ../models/finetuned_qwen_7b
logging_steps: 10
save_steps: 500
plot_loss: true

per_device_train_batch_size: 2
gradient_accumulation_steps: 4
learning_rate: 2.0e-5
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true

val_size: 0.1
per_device_eval_batch_size: 2
eval_strategy: steps
eval_steps: 500
